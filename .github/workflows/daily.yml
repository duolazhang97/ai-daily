name: AI Daily News

on:
  schedule:
    # 每天 UTC 22:00 = 北京时间次日 06:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate AI Daily
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

      - name: Commit & push
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@ai-daily.local"
          git add index.html
          git diff --staged --quiet || git commit -m "📰 $(date +%Y.%m.%d) AI Daily Update"
          git push
